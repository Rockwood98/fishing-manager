services:
  postgres:
    image: postgres:16
    container_name: fishing_manager_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fishing_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - fishing_manager_data:/var/lib/postgresql/data

volumes:
  fishing_manager_data:
